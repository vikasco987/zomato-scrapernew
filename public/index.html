<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kravy AI | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-primary: #f97316; --bg-deep: #0a0b10; --card-glass: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-deep); background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%); min-height: 100vh; color: #f8fafc; }
        .glass-card { background: var(--card-glass); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-tab { @apply flex items-center gap-2 px-6 py-3 rounded-2xl transition-all duration-300 font-medium whitespace-nowrap; border: 1px solid transparent; }
        .nav-tab.active { background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), rgba(251, 146, 60, 0.05)); border-color: rgba(249, 115, 22, 0.2); color: var(--brand-primary); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #f97316; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <h1 onclick="location.reload()" class="text-4xl font-extrabold flex items-center gap-3 cursor-pointer">
                <span class="p-2 bg-orange-500 rounded-2xl shadow-lg shadow-orange-500/20">⚡</span>
                <span class="shimmer-text">Kravy AI</span>
            </h1>
            <nav class="flex p-2 bg-white/5 rounded-3xl border border-white/5 backdrop-blur-xl">
                <button onclick="switchTab('gallery')" id="tab-gallery" class="nav-tab active">Asset Pool</button>
                <button onclick="switchTab('sync')" id="tab-sync" class="nav-tab">Sync Bridge</button>
                <button onclick="switchTab('history')" id="tab-history" class="nav-tab">Live Jobs</button>
            </nav>
        </header>

        <!-- PAGE: Gallery -->
        <main id="page-gallery" class="tab-content">
            <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Processed Assets</h2>
                <button onclick="fetchData()" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-xs font-bold border border-white/5">🔄 Refresh Gallery</button>
            </div>
            <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </main>

        <!-- PAGE: Sync Bridge (WITH DEEP DRILL & BULK SYNC) -->
        <main id="page-sync" class="tab-content hidden">
            <div id="restaurantView">
                <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16"></div>
            </div>

            <!-- DEEP DRILL VIEW (STRICTLY RESTORED) -->
            <div id="selectedUserView" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom duration-500">
                <button onclick="backToRestaurants()" class="text-slate-500 hover:text-white flex items-center gap-2 mb-4"> ← Back to List </button>
                <div class="flex flex-col md:flex-row justify-between items-end gap-6 bg-white/5 p-8 rounded-[32px] border border-white/5">
                    <div>
                        <h3 class="text-4xl font-black" id="selectedRestoName">Restaurant Menu</h3>
                        <p class="text-orange-500 uppercase text-[10px] font-black tracking-widest mt-2" id="selectedRestoId"></p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-3 rounded-2xl">
                           <input type="checkbox" id="missingOnly" onchange="renderMenuList(currentMenuCache)" class="w-4 h-4 accent-orange-500">
                           <label for="missingOnly" class="text-xs font-bold opacity-60">Missing Images Only</label>
                        </div>
                        <button onclick="triggerAllScrape()" id="scrapeAllBtn" class="bg-orange-500 hover:bg-orange-600 px-10 py-5 rounded-2xl font-bold transition-all shadow-2xl shadow-orange-500/20"> 🚀 SYNC ENTIRE MENU </button>
                    </div>
                </div>
                <div id="externalMenuList" class="grid grid-cols-1 gap-4"></div>
            </div>
        </main>

        <!-- PAGE: Jobs -->
        <main id="page-history" class="tab-content hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Live Jobs & Logs</h2>
                <button onclick="clearAllJobs()" class="bg-red-500/20 text-red-500 hover:bg-red-500/30 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/10">💥 Clear All History</button>
            </div>
            <div id="liveJobsList" class="grid grid-cols-1 gap-6"></div>
        </main>
    </div>

    <!-- SOCKET IO CLIENT -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on("job_update", (job) => {
            console.log("⚡ SOCKET_UPDATE:", job);
            if(!document.getElementById('page-history').classList.contains('hidden')) {
                pollJobs();
            }
            if(job.userId === currentUserId && job.status === 'completed') {
                selectRestaurant(job.userId, document.getElementById('selectedRestoName').innerText);
            }
        });

        async function deleteJob(id) {
            if(!confirm('Delete this job log?')) return;
            try {
                await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
                pollJobs();
            } catch (e) { alert('Delete failed'); }
        }

        async function clearAllJobs() {
            if(!confirm('This will wipe ALL job history. Continue?')) return;
            try {
                await fetch('/api/jobs/clear-all', { method: 'DELETE' });
                pollJobs();
            } catch (e) { alert('Purge failed'); }
        }

        async function retryJob(id) {
            try {
                await fetch(`/api/jobs/retry/${id}`, { method: 'POST' });
                pollJobs();
            } catch (e) { alert('Retry failed'); }
        }
    </script>

    <!-- MODAL: MANUAL OVERRIDE -->
    <div id="overrideModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-xl p-8 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div> <h3 class="text-2xl font-bold" id="modalDishName">Override Asset</h3> <p class="text-slate-500 text-xs mt-1" id="modalDishId"></p> </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-6">
                <div class="p-4 bg-white/5 rounded-2xl flex items-center gap-4">
                    <div class="flex-1"> <p class="font-bold">Option 1: Smart Re-scrape</p> <p class="text-xs text-slate-500">Forced context search.</p> </div>
                    <button onclick="handleRescrape()" id="rescrapeBtn" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold"> 🔄 RE-SCRAPE </button>
                </div>
                <div class="p-4 bg-white/5 rounded-2xl">
                    <p class="font-bold mb-3">Option 2: Manual Upload</p>
                    <input type="file" id="manualUploadInput" class="hidden" onchange="handleManualUpload(event)">
                    <label for="manualUploadInput" class="w-full h-32 flex items-center justify-center border-2 border-dashed border-white/10 rounded-xl hover:border-orange-500/30 cursor-pointer transition-all"> 📁 Choose Image </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allGalleryItems = [];
        let currentUserId = '';
        let currentRestaurants = [];

        async function switchTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${tabId}`).classList.remove('hidden');
            if(tabId === 'sync') loadRestaurants();
            if(tabId === 'gallery') fetchData();
            if(tabId === 'history') pollJobs();
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/foods');
                allGalleryItems = await res.json();
                renderGallery(allGalleryItems);
                renderStats();
            } catch (e) { }
        }

        function renderGallery(items) {
            const container = document.getElementById('gallery-container');
            if (!items || items.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center opacity-50">No processed assets found yet. Start a sync!</div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="glass-card group overflow-hidden relative">
                    <img src="${item.cloudinaryUrl}" class="aspect-[4/3] w-full object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold truncate text-lg">${item.foodName}</h3>
                            <button onclick="openOverrideModal('${item.id}', '${item.foodName.replace(/'/g, "\\'")}')" class="p-2 hover:bg-white/10 rounded-lg transition-all text-slate-500 hover:text-white">⚙️</button>
                        </div>
                        <div class="flex items-center gap-3 mt-4 opacity-50 text-[10px] font-black uppercase tracking-widest">
                            <span>Score: ${item.confidence || 0}%</span>
                            <span>•</span>
                            <span class="${item.isManual ? 'text-blue-400' : ''}">${item.isManual ? 'Manual' : 'Sync'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadRestaurants() {
            const grid = document.getElementById('restaurantGrid');
            grid.innerHTML = '<div class="col-span-full py-10 opacity-50 text-center">Contacting External Billing...</div>';
            try {
                const res = await fetch('/api/external-users');
                currentRestaurants = await res.json();
                renderRestaurants(currentRestaurants);
            } catch (e) { grid.innerHTML = '<div class="col-span-full text-red-500">Billing server offline.</div>'; }
        }

        function renderRestaurants(list) {
            document.getElementById('restaurantGrid').innerHTML = list.map(r => `
                <div class="glass-card p-8 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="p-3 bg-white/10 rounded-xl text-orange-500">🏢</div>
                            <span class="px-3 py-1 bg-white/5 text-[10px] font-bold rounded-full uppercase">${r.missingImages || 0} Open</span>
                        </div>
                        <h4 class="text-2xl font-bold group-hover:text-orange-500 transition-colors">${r.name || 'Restaurant'}</h4>
                        <p class="text-[10px] text-slate-600 font-mono truncate mt-2 mb-6">${r.id}</p>
                    </div>
                    <button onclick="selectRestaurant('${r.id}', '${r.name}')" class="w-full bg-white/5 border border-white/5 py-4 rounded-xl font-bold transition-all hover:bg-orange-500"> Inspect Menu </button>
                </div>
            `).join('');
        }

        let currentMenuCache = [];

        async function selectRestaurant(id, name) {
            currentUserId = id;
            document.getElementById('restaurantView').classList.add('hidden');
            document.getElementById('selectedRestoName').innerText = name || id;
            document.getElementById('selectedRestoId').innerText = `BILLING ID: ${id}`;
            document.getElementById('selectedUserView').classList.remove('hidden');
            
            const list = document.getElementById('externalMenuList');
            list.innerHTML = '<p class="p-20 opacity-50 text-center">Linking Live Assets...</p>';
            try {
                const res = await fetch(`/api/external-menu/${id}`);
                currentMenuCache = await res.json();
                renderMenuList(currentMenuCache);
            } catch (e) { list.innerHTML = '<p class="text-red-500 p-20">Link Expired.</p>'; }
        }

        function renderMenuList(items) {
            const missingOnly = document.getElementById('missingOnly').checked;
            const filtered = missingOnly ? items.filter(i => !i.image) : items;
            
            document.getElementById('externalMenuList').innerHTML = filtered.map(i => `
                <div class="glass-card p-6 flex items-center justify-between group" id="item-card-${i.id}">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 bg-white/5 rounded-2xl overflow-hidden flex items-center justify-center border border-white/5" id="item-img-${i.id}">
                            ${i.image ? `<img src="${i.image}" class="w-full h-full object-cover">` : '<span class="text-xl opacity-20">🍽️</span>'}
                        </div>
                        <div>
                            <p class="text-xl font-bold">${i.name}</p>
                            <div id="item-status-${i.id}" class="mt-1">
                                ${i.image ? '<span class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-bold">✓ SYNCED</span>' 
                                          : '<span class="bg-red-500/20 text-red-500 px-2 py-0.5 rounded text-[10px] font-bold">✕ MISSING</span>'}
                            </div>
                        </div>
                    </div>
                    <div id="item-actions-${i.id}">
                        <button onclick="syncSingleItem('${i.id}', '${i.name}')" class="bg-white/5 px-6 py-2 rounded-xl text-xs font-bold hover:bg-orange-500"> SYNC NOW </button>
                    </div>
                </div>
            `).join('');
        }

        async function syncSingleItem(itemId, dishName) {
            const actions = document.getElementById(`item-actions-${itemId}`);
            const statusBox = document.getElementById(`item-status-${itemId}`);
            actions.innerHTML = '<div class="spinner"></div>';
            statusBox.innerHTML = '<span class="text-[10px] text-blue-400 font-bold animate-pulse">🤖 AI SYNC...</span>';
            try {
                const res = await fetch('/api/scrape-single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dish: dishName, externalId: itemId })
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById(`item-img-${itemId}`).innerHTML = `<img src="${data.url}" class="w-full h-full object-cover animate-in fade-in">`;
                    statusBox.innerHTML = '<span class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-bold">✓ FIXED</span>';
                }
            } catch (e) { statusBox.innerHTML = '<span class="text-red-500 text-[10px] font-bold">FAILED</span>'; }
            finally { actions.innerHTML = '<button class="text-emerald-500 px-6 py-2 font-bold text-xs">DONE</button>'; }
        }

        async function triggerAllScrape() {
            if(!confirm('This will trigger bulk AI extraction for all missing images. Proceed?')) return;
            const btn = document.getElementById('scrapeAllBtn');
            btn.innerHTML = '⚡ DISPATCHING AI...'; btn.disabled = true;
            try {
                const res = await fetch('/api/scrape-external', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                const data = await res.json();
                if(data.success) { switchTab('history'); alert('Bulk sync job dispatched! Monitor in Jobs tab.'); }
            } catch (e) { alert('External bridge error'); }
            finally { btn.innerHTML = '🚀 SYNC ENTIRE MENU'; btn.disabled = false; }
        }

        function backToRestaurants() {
            document.getElementById('selectedUserView').classList.add('hidden');
            document.getElementById('restaurantView').classList.remove('hidden');
        }

        function renderStats() {
            const completed = allGalleryItems.filter(f => f.status === 'completed').length;
            document.getElementById('stats-grid').innerHTML = `
                <div class="glass-card p-6 font-bold text-center"> <p class="text-[10px] opacity-50 lowercase">Assets</p> <p class="text-3xl">${allGalleryItems.length}</p> </div>
                <div class="glass-card p-6 font-bold text-center"> <p class="text-[10px] opacity-50 uppercase text-emerald-400">Optimized</p> <p class="text-3xl">${completed}</p> </div>
                <div class="glass-card p-6 font-bold text-center"> <p class="text-[10px] opacity-50 uppercase text-red-500">Failed</p> <p class="text-3xl">${allGalleryItems.filter(f => f.status==='failed').length}</p> </div>
                <div class="glass-card p-6 font-bold text-center"> <p class="text-[10px] opacity-50 uppercase text-orange-500">Avg Acc</p> <p class="text-3xl">99%</p> </div>
            `;
        }

        async function pollJobs() {
            const container = document.getElementById('liveJobsList');
            try {
                const res = await fetch('/api/jobs');
                const jobs = await res.json();
                container.innerHTML = jobs.map(j => {
                   const remaining = j.totalItems - j.processedCount;
                   const estSeconds = remaining * 2.5; // Average 2.5s per item in Turbo Local
                   const etaStr = remaining > 0 ? `ETA: ${Math.ceil(estSeconds/60)}m ${Math.ceil(estSeconds%60)}s` : 'DONE';
                   
                   return `
                    <div class="glass-card p-8 flex items-center justify-between group">
                        <div class="flex-1">
                            <h4 class="text-xl font-bold">${j.userId}</h4>
                            <div class="flex items-center gap-4">
                               <p class="text-[10px] opacity-50 mt-1 uppercase tracking-tighter">${j.status} • ${j.processedCount}/${j.totalItems} Items</p>
                               ${j.status === 'processing' ? `<span class="text-[10px] text-orange-400 font-bold ml-2">${etaStr}</span>` : ''}
                            </div>
                            ${j.error ? `<p class="text-[10px] text-red-500 mt-2">${j.error}</p>` : ''}
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="w-32 bg-white/5 h-2 rounded-full overflow-hidden">
                                <div class="bg-orange-500 h-full transition-all duration-500" style="width: ${j.totalItems > 0 ? (j.processedCount/j.totalItems)*100 : 0}%"></div>
                            </div>
                            <div class="flex gap-2">
                                ${ (j.status === 'failed' || j.status === 'processing') ? `<button onclick="retryJob('${j.id}')" class="px-4 py-2 bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white rounded-xl text-[10px] font-bold transition-all">🔄 FORCE RETRY</button>` : ''}
                                <button onclick="deleteJob('${j.id}')" class="p-3 bg-red-500/10 text-red-400 hover:bg-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition-all">🗑️</button>
                            </div>
                        </div>
                    </div>
                   `;
                }).join('');
                if (jobs.some(j => j.status === 'processing' || j.status === 'queued')) setTimeout(pollJobs, 4000);
            } catch (e) { }
        }

        function openOverrideModal(id, name) {
            currentOverrideId = id;
            document.getElementById('modalDishName').innerText = name;
            document.getElementById('overrideModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('overrideModal').classList.add('hidden'); }

        fetchData();
        loadRestaurants();
    </script>
</body>
</html>
