<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kravy AI | Ultimate Scraper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-primary: #f97316; --bg-deep: #0a0b10; --card-glass: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-deep); background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%); min-height: 100vh; color: #f8fafc; }
        .glass-card { background: var(--card-glass); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: rgba(249, 115, 22, 0.3); transform: translateY(-4px); }
        .nav-tab { @apply flex items-center gap-2 px-6 py-3 rounded-2xl transition-all duration-300 font-medium whitespace-nowrap; border: 1px solid transparent; }
        .nav-tab.active { background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), rgba(251, 146, 60, 0.05)); border-color: rgba(249, 115, 22, 0.2); color: var(--brand-primary); }
        .shimmer-text { background: linear-gradient(90deg, #f97316, #fb923c, #f97316); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div onclick="location.reload()" style="cursor:pointer">
                <h1 class="text-4xl font-extrabold flex items-center gap-3">
                    <span class="p-2 bg-orange-500 rounded-2xl shadow-lg shadow-orange-500/20">⚡</span>
                    <span class="shimmer-text">Kravy AI</span> Scraper
                </h1>
                <p class="text-slate-400 mt-2 text-sm font-medium">Enterprise Food Intelligence & Asset Pipeline</p>
            </div>
            <nav class="flex p-2 bg-white/5 rounded-3xl border border-white/5 backdrop-blur-xl">
                <button onclick="switchTab('gallery')" id="tab-gallery" class="nav-tab active">Asset Pool</button>
                <button onclick="switchTab('sync')" id="tab-sync" class="nav-tab">Sync Bridge</button>
                <button onclick="switchTab('history')" id="tab-history" class="nav-tab">Live Jobs</button>
            </nav>
        </header>

        <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12"></div>

        <!-- PAGE: Gallery -->
        <main id="page-gallery" class="tab-content">
            <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </main>

        <!-- PAGE: Sync Bridge (DIRECT BROWSE) -->
        <main id="page-sync" class="tab-content hidden">
            <div class="mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
                <div>
                   <h2 class="text-3xl font-bold">Bridge Integration</h2>
                   <p class="text-slate-400">Choose a restaurant from the live billing system to begin extraction.</p>
                </div>
                <div class="w-full md:w-96">
                   <input type="text" id="restaurantSearch" oninput="filterRestaurants(this.value)" 
                       placeholder="Find by name..." class="w-full bg-white/5 border border-white/10 px-6 py-3 rounded-2xl focus:outline-none focus:border-orange-500/50">
                </div>
            </div>

            <!-- RESTAURANT GRID -->
            <div id="restaurantGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16">
                <!-- Loaded Restaurants -->
            </div>

            <!-- SELECTED USER MENU VIEW -->
            <div id="selectedUserView" class="hidden animate-in fade-in slide-in-from-bottom duration-500 border-t border-white/5 pt-12">
                <div class="flex justify-between items-center mb-8">
                     <div>
                        <h3 class="text-2xl font-bold" id="selectedRestoName">Restaurant Menu</h3>
                        <p class="text-slate-500 uppercase text-[10px] font-black tracking-widest mt-1" id="selectedRestoId"></p>
                     </div>
                     <button onclick="triggerAllScrape()" id="scrapeAllBtn" 
                         class="bg-orange-500 hover:bg-orange-600 px-8 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-orange-500/20">
                         🚀 ENGAGE AI PIPELINE
                     </button>
                </div>
                <div id="externalMenuList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </main>

        <!-- PAGE: History -->
        <main id="page-history" class="tab-content hidden"><div id="liveJobsList" class="grid grid-cols-1 gap-6"></div></main>
    </div>

    <script>
        let allGalleryItems = [];
        let restaurants = [];
        let currentUserId = '';

        async function switchTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${tabId}`).classList.remove('hidden');
            if(tabId === 'sync') loadRestaurants();
            if(tabId === 'gallery') fetchData();
            if(tabId === 'history') pollJobs();
        }

        async function loadRestaurants() {
            const grid = document.getElementById('restaurantGrid');
            grid.innerHTML = '<div class="col-span-full py-10 opacity-50 text-center">Contacting Billing Server...</div>';
            try {
                const res = await fetch('/api/external-users');
                restaurants = await res.json();
                renderRestaurants(restaurants);
            } catch (e) { grid.innerHTML = '<div class="col-span-full text-red-400">Fetch Failed</div>'; }
        }

        function renderRestaurants(list) {
            document.getElementById('restaurantGrid').innerHTML = list.map(r => `
                <div class="glass-card p-6 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="p-3 bg-white/5 rounded-xl text-orange-500">🏢</div>
                            <span class="px-3 py-1 bg-orange-500/10 text-orange-500 text-[10px] font-bold rounded-full uppercase">
                                ${r.missingImages} Missing
                            </span>
                        </div>
                        <h4 class="text-xl font-bold text-white mb-1">${r.name || 'Unnamed Resto'}</h4>
                        <p class="text-[10px] text-slate-600 font-mono truncate mb-4">${r.id}</p>
                    </div>
                    <button onclick="selectRestaurant('${r.id}', '${r.name}')" class="w-full mt-4 bg-white/5 group-hover:bg-orange-500 py-3 rounded-xl font-bold transition-all border border-white/5">
                        Inspect Menu
                    </button>
                </div>
            `).join('');
        }

        function filterRestaurants(q) {
            const filtered = restaurants.filter(r => r.name?.toLowerCase().includes(q.toLowerCase()));
            renderRestaurants(filtered);
        }

        async function selectRestaurant(id, name) {
            currentUserId = id;
            document.getElementById('selectedRestoName').innerText = name || id;
            document.getElementById('selectedRestoId').innerText = id;
            document.getElementById('selectedUserView').classList.remove('hidden');
            const list = document.getElementById('externalMenuList');
            list.innerHTML = '<p class="p-10 opacity-50">Mapping menu items...</p>';
            try {
                const res = await fetch(`/api/external-menu/${id}`);
                const items = await res.json();
                list.innerHTML = items.map(i => `
                    <div class="glass-card p-5 border-l-4 border-l-orange-500">
                        <p class="font-bold text-lg">${i.name}</p>
                        <p class="text-[10px] uppercase font-bold text-orange-400 mt-1 italic">Missing Asset</p>
                    </div>
                `).join('');
                window.scrollTo({ top: document.getElementById('selectedUserView').offsetTop - 50, behavior: 'smooth' });
            } catch (e) { list.innerHTML = '<p class="text-red-400 p-10">Load error.</p>'; }
        }

        async function triggerAllScrape() {
            if(!currentUserId) return;
            const btn = document.getElementById('scrapeAllBtn'); btn.innerHTML = '⚙️ Queuing...'; btn.disabled = true;
            await fetch('/api/scrape-external', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId }) });
            btn.innerHTML = '✅ Process Active'; setTimeout(() => { switchTab('history'); }, 1000);
        }

        async function pollJobs() {
            const container = document.getElementById('liveJobsList');
            container.innerHTML = '<div class="col-span-full py-10 opacity-50 text-center">Loading live jobs...</div>';
            try {
                const res = await fetch('/api/jobs');
                const jobs = await res.json();
                container.innerHTML = jobs.map(j => {
                    const prog = j.totalItems > 0 ? Math.round((j.processedCount / j.totalItems) * 100) : 0;
                    const isActive = j.status === 'processing' || j.status === 'queued';
                    return `
                        <div class="glass-card p-8 flex flex-col md:flex-row gap-8 items-center relative overflow-hidden">
                            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-xl font-black bg-white/5 border border-white/10">${prog}%</div>
                            <div class="flex-1 w-full text-left">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="text-lg font-bold truncate">${j.userId}</h4>
                                    ${isActive ? `
                                        <button onclick="cancelJob('${j.id}')" class="text-[10px] text-red-400 font-bold bg-red-400/5 px-3 py-1 rounded-lg border border-red-400/20 hover:bg-red-400/10 transition-all">
                                            🛑 CANCEL JOB
                                        </button>
                                    ` : ''}
                                </div>
                                <div class="w-full bg-white/5 h-3 rounded-full border border-white/5 my-3 overflow-hidden">
                                     <div class="h-full bg-orange-500 transition-all duration-1000" style="width: ${prog}%"></div>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-[10px] text-slate-500 uppercase font-black">${j.status} - ${j.processedCount}/${j.totalItems} Items</span>
                                    ${j.error ? `<span class="text-[10px] text-red-500 font-bold italic">${j.error}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                if (jobs.some(j => j.status === 'processing' || j.status === 'queued')) setTimeout(pollJobs, 4000);
            } catch (e) { container.innerHTML = '<div class="col-span-full text-red-400">Failed to load jobs.</div>'; }
        }

        async function cancelJob(id) {
            if(!confirm('Are you sure you want to STOP this scraping job?')) return;
            try {
                await fetch(`/api/cancel-job/${id}`, { method: 'POST' });
                pollJobs();
            } catch (e) { alert('Cancel failed'); }
        }

        async function fetchData() {
            const res = await fetch('/api/foods');
            allGalleryItems = await res.json();
            renderGallery(allGalleryItems);
            renderStats();
        }

        function renderGallery(items) {
            document.getElementById('gallery-container').innerHTML = items.map(item => `
                <div class="glass-card group overflow-hidden">
                    <img src="${item.cloudinaryUrl}" class="aspect-[4/3] w-full object-cover">
                    <div class="p-6">
                        <h3 class="font-bold truncate">${item.foodName}</h3>
                        <p class="text-[10px] text-slate-500 mt-2">Verified CDN</p>
                    </div>
                </div>
            `).join('');
        }

        function renderStats() {
            const completed = allGalleryItems.filter(f => f.status === 'completed').length;
            document.getElementById('stats-grid').innerHTML = `
                <div class="glass-card p-6 border-l-4 border-l-orange-500 font-bold">Total Assets: ${allGalleryItems.length}</div>
                <div class="glass-card p-6 border-l-4 border-l-emerald-500 font-bold">Optimised: ${completed}</div>
                <div class="glass-card p-6 border-l-4 border-l-blue-500 font-bold">Accuracy: 98%</div>
                <div class="glass-card p-6 border-l-4 border-l-red-500 font-bold">Fails: 0</div>
            `;
        }

        fetchData();
        loadRestaurants();
    </script>
</body>
</html>
