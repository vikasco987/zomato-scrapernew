<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kravy AI | Lead Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --brand-primary: #f97316; 
            --brand-secondary: #8b5cf6;
            --bg-deep: #05060a; 
            --card-glass: rgba(255, 255, 255, 0.02); 
            --card-border: rgba(255, 255, 255, 0.06); 
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-deep); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(10, 11, 16, 1) 0%, rgba(5, 6, 10, 1) 100%);
            background-attachment: fixed;
            min-height: 100vh; 
            color: var(--text-main); 
        }

        .glass-card { 
            background: var(--card-glass); 
            backdrop-filter: blur(24px); 
            border: 1px solid var(--card-border); 
            border-radius: 28px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
            outline: none;
        }
        .table-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s;
        }
        .table-row:hover {
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body class="p-8">
<div class="max-w-7xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-purple-500">Lead Scraper Pro</h1>
            <p class="text-gray-400 mt-2">Extract restaurant leads globally with 100% uniqueness & session history</p>
        </div>
        <div class="flex space-x-4">
            <button onclick="switchTab('scanner')" id="scannerTabBtn" class="px-6 py-2 rounded-full border border-orange-500 bg-orange-500/10 text-orange-400 text-sm font-bold transition-all">Scanner</button>
            <button onclick="switchTab('history')" id="historyTabBtn" class="px-6 py-2 rounded-full border border-gray-700 hover:border-orange-500 transition-colors text-sm text-gray-400">History</button>
            <a href="/" class="px-6 py-2 rounded-full border border-gray-700 hover:border-orange-500 transition-colors text-sm text-gray-400">➔ Dashboard</a>
        </div>
    </div>

    <!-- Scanner Tab -->
    <div id="scannerView" class="space-y-8">
        <div class="glass-card p-8">
            <div class="flex space-x-4 items-end">
                <div class="flex-1 space-y-2">
                    <label class="text-sm text-gray-400 font-medium">Select Location</label>
                    <select id="locationInput" class="glass-input w-full px-5 py-4 rounded-xl">
                        <option value="Delhi">Delhi NCR</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Pune">Pune</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Jaipur">Jaipur</option>
                    </select>
                </div>
                <div class="flex-1 space-y-2">
                    <label class="text-sm text-gray-400 font-medium">Data Source</label>
                    <select id="sourceInput" class="glass-input w-full px-5 py-4 rounded-xl">
                        <option value="zomato">Zomato</option>
                        <option value="google">Google</option>
                        <option value="swiggy">Swiggy</option>
                    </select>
                </div>
                <div>
                    <button id="startBtn" onclick="startScraping()" class="px-10 py-4 bg-gradient-to-r from-orange-500 to-red-500 rounded-xl font-bold text-white hover:shadow-lg hover:shadow-orange-500/20 transition-all flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span>Extract Leads</span>
                    </button>
                </div>
                <div>
                    <button onclick="exportToCSV()" class="px-6 py-4 bg-green-600/20 border border-green-500/50 text-green-400 rounded-xl font-bold hover:bg-green-600/30 transition-all">
                        Download CSV
                    </button>
                </div>
            </div>
            <div class="mt-4 text-sm text-gray-500 italic" id="statusLog">Ready. Select location to start discovery.</div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="leadsTable">
                    <thead class="bg-black/40 border-b border-white/5 uppercase text-gray-500 text-xs tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Restaurant / Address</th>
                            <th class="px-6 py-4">Phone Number</th>
                            <th class="px-6 py-4">Source</th>
                            <th class="px-6 py-4">Confidence</th>
                            <th class="px-6 py-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsBody" class="text-gray-300"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- History Tab -->
    <div id="historyView" class="hidden space-y-8">
        <div class="glass-card p-8">
            <h2 class="text-xl font-bold text-white mb-6 flex items-center">
                <svg class="w-5 h-5 mr-3 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Scraping History
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="historyGrid">
                <!-- Session Cards -->
            </div>
        </div>
        
        <div id="sessionDetailContainer" class="hidden glass-card overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="text-lg font-bold text-white" id="sessionTitle">Session Details</h3>
                <button onclick="closeSessionDetail()" class="text-gray-400 hover:text-white">✕ Close</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-black/40 border-b border-white/5 uppercase text-gray-400 text-xs tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Restaurant / Address</th>
                            <th class="px-6 py-4">Phone Number</th>
                            <th class="px-6 py-4">Confidence</th>
                            <th class="px-6 py-4">URL</th>
                        </tr>
                    </thead>
                    <tbody id="sessionLeadsBody" class="text-gray-300"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let extractedLeads = [];
    const socket = io(window.location.origin);

    socket.on('lead_status', (data) => {
        document.getElementById('statusLog').innerHTML = `🔄 ${data.message}`;
    });

    socket.on('lead_added', (lead) => {
        extractedLeads.unshift(lead);
        renderTable('leadsBody', extractedLeads);
    });

    async function startScraping() {
        const location = document.getElementById('locationInput').value;
        const source = document.getElementById('sourceInput').value;
        const btn = document.getElementById('startBtn');
        
        extractedLeads = [];
        renderTable('leadsBody', extractedLeads);
        
        btn.disabled = true;
        btn.innerHTML = `<span class="animate-spin">🔄</span> <span>Scraping...</span>`;
        
        try {
            await fetch('/api/scrape-leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ location, source })
            });
        } catch(e) {
            alert('Failed to start scraping: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<span>Extract Leads</span>`;
        }
    }

    function renderTable(bodyId, dataArr) {
        const tbody = document.getElementById(bodyId);
        tbody.innerHTML = '';
        dataArr.forEach(lead => {
            const scoreColor = lead.confidence >= 90 ? 'text-green-400' : 'text-yellow-500';
            const row = document.createElement('tr');
            row.className = 'table-row';
            row.innerHTML = `
                <td class="px-6 py-4">
                    <div class="font-medium text-white">${lead.name}</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-tighter truncate max-w-xs" title="${lead.address}">${lead.address || 'Location N/A'}</div>
                </td>
                <td class="px-6 py-4 font-mono text-orange-400 font-bold">${lead.phone}</td>
                <td class="px-6 py-4"><span class="px-2 py-1 bg-white/5 border border-white/10 rounded-md text-[10px] uppercase">${lead.source}</span></td>
                <td class="px-6 py-4">
                   <div class="flex items-center space-x-2">
                       <span class="${scoreColor} text-xs font-bold">${lead.confidence}%</span>
                       <div class="w-12 bg-gray-800 rounded-full h-1 overflow-hidden">
                           <div class="bg-gradient-to-r from-orange-500 to-purple-500 h-full" style="width: ${lead.confidence}%"></div>
                       </div>
                   </div>
                </td>
                <td class="px-6 py-4">
                    ${lead.url ? `<a href="${lead.url}" target="_blank" class="text-blue-400 hover:text-blue-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </a>` : '—'}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // --- TAB SYSTEM ---
    function switchTab(tab) {
        if(tab === 'scanner') {
            document.getElementById('scannerView').classList.remove('hidden');
            document.getElementById('historyView').classList.add('hidden');
            document.getElementById('scannerTabBtn').className = "px-6 py-2 rounded-full border border-orange-500 bg-orange-500/10 text-orange-400 text-sm font-bold transition-all";
            document.getElementById('historyTabBtn').className = "px-6 py-2 rounded-full border border-gray-700 hover:border-orange-500 transition-colors text-sm text-gray-400";
        } else {
            document.getElementById('scannerView').classList.add('hidden');
            document.getElementById('historyView').classList.remove('hidden');
            document.getElementById('historyTabBtn').className = "px-6 py-2 rounded-full border border-orange-500 bg-orange-500/10 text-orange-400 text-sm font-bold transition-all";
            document.getElementById('scannerTabBtn').className = "px-6 py-2 rounded-full border border-gray-700 hover:border-orange-500 transition-colors text-sm text-gray-400";
            loadHistory();
        }
    }

    async function loadHistory() {
        const grid = document.getElementById('historyGrid');
        grid.innerHTML = '<div class="text-gray-500 animate-pulse">Loading history...</div>';
        
        try {
            const res = await fetch('/api/leads/history');
            const data = await res.json();
            
            grid.innerHTML = '';
            data.forEach(session => {
                const card = document.createElement('div');
                card.className = "glass-card p-6 cursor-pointer hover:border-orange-500/50 transition-all border border-white/5";
                card.onclick = () => loadSession(session.id, session.location, session.createdAt);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs uppercase bg-orange-500/20 text-orange-400 px-2 py-1 rounded font-bold">${session.source}</span>
                        <span class="text-[10px] text-gray-500">${new Date(session.createdAt).toLocaleString()}</span>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-1">${session.location} Run</h3>
                    <div class="text-sm text-gray-400 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
                        ${session.count} Unique Leads Extracted
                    </div>
                    <div class="mt-4 text-[10px] text-gray-600 uppercase font-bold tracking-widest">ID: ${session.id.slice(-6)}</div>
                `;
                grid.appendChild(card);
            });
        } catch(e) {
            grid.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
        }
    }

    async function loadSession(id, location, date) {
        document.getElementById('sessionDetailContainer').classList.remove('hidden');
        document.getElementById('sessionTitle').innerText = `${location} Session - ${new Date(date).toLocaleDateString()}`;
        document.getElementById('sessionLeadsBody').innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center animate-pulse">Loading leads...</td></tr>';
        
        try {
            const res = await fetch(`/api/leads/session/${id}`);
            const data = await res.json();
            renderTable('sessionLeadsBody', data);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } catch(e) {
            alert('Failed to load session details');
        }
    }

    function closeSessionDetail() {
        document.getElementById('sessionDetailContainer').classList.add('hidden');
    }

    async function exportToCSV() {
        let leadsToExport = extractedLeads;
        if(leadsToExport.length === 0) {
            document.getElementById('statusLog').innerText = "📡 Exporting Full Database...";
            try {
                const res = await fetch('/api/leads/export');
                leadsToExport = await res.json();
            } catch (e) { return alert("Export failed"); }
        }

        if(leadsToExport.length === 0) return alert("Nothing to export.");
        
        const headers = ["Restaurant", "Outlet", "Phone Number", "Source", "Confidence %", "Address", "Captured At"];
        const rows = leadsToExport.map(l => [
            `"${l.name.replace(/"/g, '""')}"`,
            `"${(l.outletName || '').replace(/"/g, '""')}"`,
            `"${l.phone}"`,
            `"${l.source}"`,
            `"${l.confidence}"`,
            `"${(l.address || '').replace(/"/g, '""')}"`,
            `"${new Date(l.createdAt).toLocaleString()}"`
        ]);
        
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `kravy_leads_export_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</script>
</body>
</html>
